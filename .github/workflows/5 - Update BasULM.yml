name: 5 - Update BasULM

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-basulm:
    if: github.repository == 'planeur-net/outlanding'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          sparse-checkout: |
            .gitattributes
            guide_aires_securite.cup
            basulm_terrains.cup
            basulm_terrains.cupx
            Base_ULM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: Base_ULM
        run: npm ci

      - name: Run BasULM updater
        run: node Base_ULM/src/fetchBasulm.js

      - name: Remove transient dependencies
        shell: pwsh
        run: |
          if (Test-Path Base_ULM/node_modules) {
            Remove-Item -Recurse -Force Base_ULM/node_modules
          }

      - name: Compute branch date
        id: branch_date
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          "value=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create branch, push changes, and open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update BasULM data"
          title: "chore: update BasULM data (${{ steps.branch_date.outputs.value }})"
          body: |
            Automated BasULM update.

            - Branch: `autogenerated/basulm_${{ steps.branch_date.outputs.value }}`
            - Generated by running `node Base_ULM/src/fetchBasulm.js`
          branch: "autogenerated/basulm_${{ steps.branch_date.outputs.value }}"
          base: main
          add-paths: |
            basulm_terrains.cup
            basulm_terrains.cupx
            Base_ULM/pdf/**
            Base_ULM/Pics/**
