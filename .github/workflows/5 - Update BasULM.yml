name: 5 - Update BasULM

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-basulm:
    if: github.repository == 'planeur-net/outlanding'
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          sparse-checkout: |
            .gitattributes
            guide_aires_securite.cup
            basulm_terrains.cup
            basulm_terrains.cupx
            Base_ULM

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: Base_ULM
        run: npm ci

      - name: Snapshot BasULM CUP before update
        shell: pwsh
        run: Copy-Item -LiteralPath basulm_terrains.cup -Destination basulm_terrains.before.cup -Force

      - name: Run BasULM updater
        run: node Base_ULM/src/fetchBasulm.js

      - name: Detect CUP substantive changes
        id: cup_change
        shell: pwsh
        run: |
          function Normalize-Cup([string]$filePath) {
            if (-not (Test-Path -LiteralPath $filePath)) {
              return @()
            }

            return (Get-Content -LiteralPath $filePath) |
              Where-Object { $_ -notmatch '^"version=",|^version=' } |
              ForEach-Object { $_.TrimEnd() }
          }

          $before = Normalize-Cup "basulm_terrains.before.cup"
          $after = Normalize-Cup "basulm_terrains.cup"

          $sameWithoutVersion = (($before -join "`n") -eq ($after -join "`n"))
          if ($sameWithoutVersion) {
            Write-Host "Only the CUP version line changed; push and PR will be skipped."
            "only_version_change=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "only_version_change=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

          Remove-Item -LiteralPath basulm_terrains.before.cup -Force -ErrorAction SilentlyContinue

      - name: Remove transient dependencies
        shell: pwsh
        run: |
          if (Test-Path Base_ULM/node_modules) {
            Remove-Item -Recurse -Force Base_ULM/node_modules
          }

      - name: Compute branch date
        id: branch_date
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          "value=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Commit and push BasULM changes
        id: push_changes
        if: steps.cup_change.outputs.only_version_change != 'true'
        shell: pwsh
        env:
          BRANCH_NAME: autogenerated/basulm_${{ steps.branch_date.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$env:BRANCH_NAME"
          git add basulm_terrains.cup basulm_terrains.cupx Base_ULM/pdf Base_ULM/Pics

          $staged = git diff --cached --name-only
          if (-not $staged) {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          git commit -m "chore: update BasULM data"
          git push --force-with-lease --set-upstream origin "$env:BRANCH_NAME"

          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create or reuse pull request
        if: steps.push_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: autogenerated/basulm_${{ steps.branch_date.outputs.value }}
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const { owner, repo } = context.repo;

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base: 'main'
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists: ${existing.data[0].html_url}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title: `chore: update BasULM data (${process.env.BRANCH_NAME.split('_').pop()})`,
              head: branch,
              base: 'main',
              body: [
                'Automated BasULM update.',
                '',
                `- Branch: \`${branch}\``,
                '- Generated by running `node Base_ULM/src/fetchBasulm.js`'
              ].join('\n')
            });

            core.info(`Created PR: ${pr.data.html_url}`);

      - name: Skip notice
        if: steps.cup_change.outputs.only_version_change == 'true'
        run: echo "Skipped push and PR because basulm_terrains.cup only changed in version metadata."
