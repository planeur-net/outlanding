name: 5 - Update BasULM

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-basulm:
    if: github.repository == 'planeur-net/outlanding'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Install npm dependencies
        working-directory: Base_ULM
        run: npm ci

      - name: Run BasULM updater
        run: node Base_ULM/src/fetchBasulm.js

      - name: Compute branch date
        id: branch_date
        run: echo "value=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Create branch, push changes, and open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update BasULM data"
          title: "chore: update BasULM data (${{ steps.branch_date.outputs.value }})"
          body: |
            Automated BasULM update.

            - Branch: `autogenerated/basulm_${{ steps.branch_date.outputs.value }}`
            - Generated by running `node Base_ULM/src/fetchBasulm.js`
          branch: "autogenerated/basulm_${{ steps.branch_date.outputs.value }}"
          base: main
          add-paths: |
            basulm_terrains.cup
            basulm_terrains.cupx
            Base_ULM/pdf/**
            Base_ULM/Pics/**
